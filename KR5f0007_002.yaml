body:
  text: 大道下仁義禮樂名法刑賞凡此八者五帝三王治世之術也故仁以導之義以宜之禮以行之樂以和之名以正之法以齊之刑以威之賞以勸之故仁者所以博施於物亦所以生偏私義者所以立節行亦所以成華偽禮者所以行恭謹亦所以生惰慢樂者所以和情志亦所以生淫放名者所以正尊卑亦所以生矜篡法者所以齊衆異亦所以乖分刑者所以威不服亦所以生陵暴賞者所以勸忠能亦所以生鄙爭凡此八術無隱於人而常存於世非自顯於堯湯之時非自逃於桀紂之朝用得其道則天下治失其道則天下亂過此而往雖彌綸天地籠絡萬品治道之外非羣生所餐挹聖人錯而不言也凡國之存亡有六徵有衰國有亡國有昌國有強國有治國有亂國所謂亂亡之國者凶虐殘暴不與焉所謂強治之國者威力仁義不與焉君年長多媵以證切少子孫疏宗族衰國也君寵臣臣愛君公法廢私欲行亂國也國貧小家富大君權輕臣勢重亡國也凡此三徵不待凶虐殘暴而後弱也雖曰見存吾必謂之亡者也內無專寵外無近習支庶繁字長幼不亂昌國也農桑以時倉稟充實兵甲徑利封疆修理強國也上不勝其下下不能犯其上上下不相勝犯故禁令行人人無私雖經險易而國不可侵治國也凡此三徵不待威力仁義而後強雖曰見弱吾必謂之存者治主之興必有所先誅先誅者非謂盜非謂姦此二惡者一時之大害非亂政之本也亂政之本下侵上之權臣用君之術心不畏時之禁行不軌時之法此大亂之道也孔丘攝魯相七日而誅少失照切正卯門人進問曰夫少正卯魯之聞人也夫子為政而先誅得無失乎孔子曰居吾語牛據切汝其故人有惡者五而竊盜姦私不與焉一曰心達而險二曰行僻而堅三曰言偽而辨四曰強記而博五曰順非而澤此五者有一於人則不免君子之誅而少正卯兼有之故居處足以聚徒成羣言談足以飾邪熒衆強記足以反是獨立此小人雄桀也不可不誅也是以湯誅尹諧文王誅潘正太公誅華士管仲誅付里乙子産誅鄧析史付此六子者異世而同心不可不誅也詩曰憂心悄悄愠於羣小小人成羣斯足畏也語曰佞辨可以熒惑鬼神曰鬼神聰明正直孰曰熒惑者曰鬼神誠不受熒惑此尤佞辨之巧靡不人也夫佞辨者雖不能熒惑鬼神熒惑人眀矣探人之心度人之欲順人之嗜好而不敢逆納人於邪惡而求其利人喜聞已之美也善能揚惡聞已之過也善能飾之得之於眉睫之間承之於言行之先語曰惡紫之奪宋惡利口之覆邦家斯言足畏而終身莫悟危亡繼踵焉老子曰以政治國以奇用兵以無事取天下政者名法是也以名法治國萬物所不能亂奇者權術是也以權術用兵萬物所不能敵凡能用名法權術而矯抑殘暴之情則已無事焉已無事則得天下矣故失治則任法失法則任兵以求無事不以取強取強則柔者反能服之老子曰民不畏死如何以死懼之凡民之不畏死由刑罰過刑罰過則民不賴其生生無所賴視君之威末如也刑罰中則民畏死畏死由生之可樂也知生之可樂故可以死懼之此人君之所宜執臣下之所宜慎田子讀書曰堯時太平宋子曰聖人之治以致此乎彭蒙在則越次答曰聖法之治以至此非聖人之治也宋子曰聖人與聖法何以異彭蒙曰子之亂名甚矣聖人者自已出也聖法者自理出也理出於已已非理也已能出理理非已也故聖人之治獨治者也聖法之治則無不治矣此萬世之利唯聖人能該之宋子猶惑質於田子田子曰蒙之言然莊里丈人字長子曰盜少子曰毆盜出行其父在後追呼之曰盜盜吏聞因縛之其父呼毆喻吏遽而聲不轉但言毆毆吏因毆之幾殪一計切康衢長者字僮曰善搏音博字犬曰善噬賓客不過其門者三年長者怪而問之乃實對於是改之賓客往復鄭人謂玉未理者為璞周人謂鼠未臘者為璞周人懷璞謂鄭賈曰欲買璞乎鄭賈曰欲之出其璞視之乃鼠也因謝不取父之於子也令有必行者有必不行者去貴妻賣愛妾此令必行者也因曰汝無敢恨汝無敢思令必不行者也故為人上者必慎所令凡人富則不羡爵祿貧則不畏刑罰不羡爵祿者自足於已也不畏刑罰者不賴存身也二者為國之所甚而不知防之之術故令不行而禁不止若使令不行而禁不止則無以為治無以為治是人君虛臨其國徒君其民危亂可立而待矣今使由爵祿而後富則人力爭盡力於其君矣由刑罰而後貧則人咸畏罪而從善矣故古之為國者無使民自貧富貧富皆由於君則君專所制民知所歸矣貧則怨人賤則怨時而莫有自怨者此人情之大趣也然則不可以此是人情之大趣而一概非之亦有可矜者焉不可不察也今能同算鈞而彼富我貧能不怨則美矣雖怨無所非也才鈞智同而彼貴我賤能不怨則美矣雖怨無所非也其敝在於不知乘權藉勢之異而雖曰智能之同是不達之過雖君子之郵亦君子之怒也人貧則怨人富則驕人怨人者苦人之不祿施於已也起於情所難安而不能安猶可恕也驕人者無苦而無故驕人此情所易制而弗能制弗可恕矣衆人見貧賤則慢而疏之見富貴則敬而親之貧賤者有請賕於已踈之可也未必損已而必疏之以其無益物之具故也富貴者有施與已親之可也未必益己而必親之則彼不敢親我矣三者獨立無致親致疏之所人情終不能不以貧賤富貴易慮故謂之大惑焉窮獨貧賤治世之所共矜亂世之所共侮治世非為矜窮獨貧賤而治是治之一事也亂世亦非侮窮獨貧賤而亂亦是亂之一事也每事治則無亂亂則無治視夏商之盛夏商之衰則其驗也貧賤之望富貴甚微而富貴不能酬其甚微之望夫富貴者之所惡貧者之所美貴者之所輕賤者之所榮然而弗酬弗與同苦樂故也雖弗酬之於我弗傷今萬民之望人君亦如貧賤之望富貴其所望者蓋欲料長幼平賦斂時其飢寒省其疾痛賞罰不濫使役以時如此而已則於人君弗損也然而弗酬弗與同勞逸故也故為人君不可弗與民同勞逸焉故富貴者可不酬貧賤者人君不可不酬萬民不酬萬民則萬民之所不願戴所不願戴則君位替矣危莫甚焉禍莫大焉尹文子卷下

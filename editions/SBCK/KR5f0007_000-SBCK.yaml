front:
  text: 尹文子序尹文子者蓋出於周之尹氏齊宣王時居稷下與宋鈃彭蒙田駢同學於公孫龍公孫龍稱之著書一篇多所彌綸莊子曰不累於物不苟於人不忮於衆願天下之安寧以活於民命人我之養畢足而止之以此白心見侮不辱此其道也而劉向亦以其學本於黃老大較刑名家也近爲誣矣余黃初末始到京師繆熈伯以此書見示意甚玩之而多脫誤聊試條次撰定爲上下篇亦未能究其詳也

body:
  text: 山陽仲長氏撰定尹文子者蓋出於周之尹氏齊宣王時居稷下與宋鈃彭蒙田駢同學於公孫龍公孫龍稱之著書一篇多所彌綸莊子曰不累於物不苟於人不忮於衆願天下之安寧以活於民命人我之養畢足而止以此白心見侮不辱此其道也而劉向亦以其學本於黄老大較刑名家也近爲誣矣余黄初末始到京師繆熙伯以此書見示意甚玩之而多脫誤聊試條次撰定爲上下篇亦未能究其詳也
  hash: sha256:b92efc70016c965695f796021f5c1574be2245a8c27d00b19bb27ce9bb7dbd88

front:
  text: 尹文子卷上
  hash: sha256:b5c8c8d22ab3dbc68a3e19ed25cd6884f65ef723532dccf789982d18c9105b13
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0007_HFL_001-001a, image: hfl/0840/0840-104.png}
body:
  text: 大道上大道無形稱器有名名也者正形者也形正由名則名不可差故仲尼云必也正名乎名不正則言不順也大道不稱衆有必名生於不稱則羣形自得其方圓名生於方圓則衆名得其所稱也大道治者則名法儒墨自廢以名法儒墨治者則不得離道老子曰道者萬物之奧善人之寶不善人之所寶是道治者謂之善人藉名法儒墨者謂之不善人善人之與不善人名分扶問切日離不待審察而得也道不足以治則用法法不足以治則用術術不足以治則用權權不足以治則用勢勢用則反權權用則反術術用則反法法用則反道道用則無為而自治故窮則徼吉吊切終徼終則反始始終相襲無窮極也有形者必有名有名者未必有形形而不名未必失其方圓白黑之實名而不可不尋名以檢其差故亦有名以檢形形以定名名以定事事以檢名察其所以然則形名之與事物無所隱其理矣名有三科法有四呈一曰命物之名方圓白黑是也二曰毁譽之名善惡貴賤是也三曰况謂之名賢愚愛憎是也一曰不變之法君臣上下是也二曰齊俗之法能鄙同異是也三曰治衆之法慶賞刑罰是也四曰平準之法律度權量是也術者人君之所密用羣下不可妄窺勢者制法之利器羣下不可妄為人君有術而使羣下得窺非術之奧者有勢使羣下得為非勢之重者大要在乎先正分使不相侵雜然後術可祕勢可專名者名形者也形者應名者也然形非正名也名非正形也則形也則形之與名居然别矣不可相亂亦不可相無無名故大道無稱有名故名以正形今萬物具存不以名正之則亂萬名具列不以形應之則乖故形名者不可不正也善名命善惡名命惡故善有善名惡有惡名聖賢仁智命善者也頑嚚魚巾切凶愚命惡者也今即聖賢仁智之名以求聖賢仁智之實未之或盡也即頑嚚凶愚之名以求頑嚚凶愚之實亦未或盡也使善惡之盡然有分雖未能盡物之實猶不患其差也故曰名不可不辨也名稱者别彼此而檢虛實者也自古至今莫不用此而得用彼而失失者由名分混得者由名分察今親賢而疏不肖賞善而罰惡賢不肖善惡之名宜在彼親疏賞罰之稱宜屬我我之與彼又復一名名之察者也名賢不肖為親疏名善惡為賞罰合彼我之一稱而不别之名之混者也故曰名稱者不可不察也語曰好虛到切牛又曰不可不察也好則物之通稱牛則物之定形以通稱隨定形不可窮極者也設復言好馬則復連於馬矣則好所通無方也設復言好人則彼屬於人也則好非人人非好也則好牛好馬好人之名自離矣故曰名分不可相亂也五色五聲五臭五味凡四類自然存焉天地之間而不期為人用人必用之終身各有好惡而不能辨其名分名宜屬彼宜屬我我愛白而憎黑韻商而舍音捨徵好膻而惡焦嗜甘而逆苦白黑商徵膻焦甘苦彼之名也愛憎韻舍好惡嗜逆我之分也定此名分則萬事不亂也故人以度審長短以量受少多以衡平輕重以律均清濁以名稽虛實以法定治亂以簡制煩惑以易御險難以萬事皆歸於一百度皆準於法歸一者簡之至準法者易之極如此頑嚚聾瞽可以察慧聰明同其治也天下萬事不可備能責其備能於一人則賢聖其猶病諸設一人能備天下之事能左右前後之宜遠近遲疾之間必有不兼者焉苟有不兼於治闕矣全治而無闕者大小多少各當丁浪切其分農商工仕不易其業老農長商習工舊仕莫不存焉則處上者何事哉故有理而無益於治者君子弗言有能而無益於事者君子弗為君子非樂有言有益於治不得不言君子非有為有益於事不得不為故所言者不出於名法權術所為者不出於農稼軍陳周務而已故明主不為治外之理小人必言事外之能小人亦知言損於治而不能不言小人亦知能損於事而不能不為故所言者極於儒墨是非之辨所為者極於堅偽偏抗口浪切之行求名而已故明主誅之古語曰不知無害於君子知之無損於小人工匠不能無害於巧君子不知無害於治此信矣為善使人不能得從此獨善也為巧使人不能得從此獨巧也未盡善巧之理為善與衆行之為巧與衆能之此善之善者巧之巧者也所貴聖人之治不貴其獨治貴其能與衆共治也工倕音垂之巧不貴其獨巧貴其能與衆共巧也今世之人行欲獨賢事欲獨能辨欲出羣勇欲絶衆獨行之賢不足以成化獨能之事不足以周務出羣之辨不可為户説絶衆之勇不可與征陳凡此四者亂之所由生是以聖人任道以其險立法以理其差使賢愚不相棄能鄙不相遺能鄙不相遺則能鄙齊功賢愚不相棄則賢愚等慮此至治之術也名定則物不競分扶問切明則私不行物不競非無心由名定故無所措其心私不行非無欲由分明故無所措其欲然則心欲人人有之而得同於心無欲者制之有道也田駢蒲眠切曰天下之士莫肯處其門庭臣其妻子必遊宦諸侯之朝者利引之也遊於諸侯之朝皆志為卿大夫而不擬於諸侯者名限之也彭蒙曰雉兔在野衆人逐之分未定也雞豕滿市莫有志者分定故也物奢則仁智相屈分定則貪鄙不爭圓者之轉非能轉而轉不得不轉也方者之止非能止而止不得不止也因圓之自轉使不得止因方之自止使不得轉何苦物之失分故因賢者之有用使不得不用因愚者之無用使不得用用與不用皆非我用因彼所用與不可用而自得其用奚患物之亂乎物皆不能自能不知自知智非能智而智愚非能愚而愚好非能好而好醜非能醜而醜夫不能自能不知自知則智好何所貴愚醜何所賤則智不能得夸愚好不能得嗤醜此為得之道也道行於世則貧賤者不怨富貴者不驕愚弱者不懾質涉切智勇者不陵定於分也法行於世則貧賤者不敢怨富貴富貴者不敢陵貧賤愚弱者不敢冀智勇智勇者不敢鄙愚弱此法之不及道也世之所貴同而貴之謂之俗世之所用同而用之謂之物苟違於人俗所不與苟忮攴義切於衆俗所共去故心皆殊而為行若一所好各異而資用必同此俗之所齊物之所飾故所齊不可不慎所飾不可不擇昔齊桓好許浩切衣紫闔境不鬻異彩楚莊愛細腰一國皆有飢色上之所以率下乃治亂之所由也故俗苟沴必為法以矯之物苟溢必立制以檢之纍力偽切於俗飾於物者不可與為治矣昔晉國苦奢文公以儉矯之乃衣不重帛食不兼肉無幾時人皆大布之衣脫粟之飯越王勾踐謀報吳欲人之勇路逢怒蛙而軾之比及數年民無長幼臨敵雖湯火不避居上者之難如此之驗聖王知民情之易動故作樂以和之制禮以節之在下者不得用其私故禮樂獨行禮樂獨行則私欲寢廢私欲寢廢則遭賢之與遭愚均矣若使遭賢則治遭愚則亂是治亂續於賢愚不係於禮樂是聖人之術與聖主而俱沒治世之法逮易世而莫用則亂多而治寡亂多而治寡則賢無所貴愚無所賤矣處名位雖不肖下愚物不疏音踈已親踈係乎勢利不係乎不肖與仁賢吾亦不敢據以為天理以為地勢之自然者爾今天地之間不肖實衆仁賢實寡趨利之情不肖特厚廉耻之情仁賢偏多今以禮義招仁賢所得仁賢者萬不一焉以名利招不肖所得不肖者觸地是焉故曰禮義成君子君子未必須禮義名利治小人小人不可無名利慶賞刑罰君事也守職效能臣業也君科功黜陟故有慶賞刑罰臣各慎所任故有守職效能君不可與臣業臣不可侵君事上下不相侵與謂之名正名正而法順也接萬物使分别海內使不雜見侮不辱見推不矜禁暴息兵救世之鬪此仁君之德可以為主矣守職分使不亂慎所任而無私飢飽一心毁譽同慮賞亦不忘罰亦不怨此居下之節可為人矣世有因名以得實亦以因名以失實宣王好射説音侻人之謂已能用強也其實所用不過三石以示左右左右皆引試之中闕而止皆曰不下九石非大王孰能用是宣王悅之然則宣王用不過三石而終身自以為九石三石實也九石名也宣王悅其名而喪其實齊有黃公者好謙卑有二女皆國色以其美也常謙辭毁之以為醜惡醜惡之名遠布年過而一國無聘者衛有鰥夫時冒娶之果國色然後曰黃公好謙故毁其子不姝美於是爭禮之亦國色也國色實也醜惡名也此違名而得實矣楚人簷山雉者路人問何鳥也簷雉者欺之曰鳳凰也路人曰我聞有鳳凰今直見之汝販之乎曰然則十金弗與請加倍乃與之將欲獻楚王經宿而鳥死路人不遑惜金惟恨不得以獻楚王國人傳之咸以為真鳳凰貴欲以獻之遂聞楚王感其欲獻於已召而厚賜之過於買鳥之金十倍魏田父有耕於野者得寶玉徑尺弗知其玉也以告鄰人鄰人陰欲圖之謂之曰此怪石也畜之弗利其家弗如復之田父雖疑猶録以歸置於廡音侮下其夜玉明光照一室田父稱家大怖音故切復以告鄰人曰此怪之徵遄市專切棄殃可銷於是遽而棄於遠野鄰人無何盜之以獻魏王魏王召玉工相之玉工望之再拜而立敢賀王王得此天下之寶臣未嘗見王問其價玉工曰此無價以當之五城之都僅可一觀魏王立賜獻玉者千金長食上大夫祿凡天下萬里皆有是非吾所不敢誣是者常是非者常非亦吾所信然是雖常是有時而不用非雖常非有時而必行故用是而失有矣行非而得有矣是非之理不同而更興廢翻為我用則是非焉在哉觀堯舜湯武之成或順或逆得時則昌桀紂幽厲之敗或是或非失時則亡五伯之主亦然宋公與楚人戰於泓烏宏切公子目夷曰楚衆我寡請其未悉濟而擊之宋公曰不可吾聞不鼓不成列寡人雖亡之餘不敢行也戰敗楚人執宋公齊人弒襄公立公孫無知召忽夷吾奉公子紏奔魯鮑叔牙奉公子小白奔莒既而無知被殺二公子爭國紏宜立者也小白先入故齊人立之既而使魯人殺紏召忽死之徵夷吾以為相晉文公為驪姬之譛出亡十九年惠公卒賂秦以求反國殺懷公子而自立彼一君正而不免於執二君不正霸業遂焉已是而舉世非之則不知己之是已非而舉世是之亦不知己所非然則是非隨衆賈而為正非己所獨了則犯衆者為非順衆者為是故人君處權乘勢處所是之地則人所不得非也居則物尊之動則物從之言則物誠之行則物則之所以居物上御羣下也國亂有三事年飢民散無食以聚之則亂治國無法則亂有法而不能用則亂有法食以聚民有法而能行國不治未之有也尹文子卷上
